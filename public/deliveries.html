<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreInventory | Delivery Orders</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <aside class="sidebar">
        <div class="logo">CoreInventory</div>
        <ul>
            <li onclick="location.href='index.html'">Dashboard</li>
            <li onclick="location.href='products.html'">Products</li>
            <li onclick="location.href='receipts.html'">Receipts</li>
            <li class="active">Delivery Orders</li>
            <li onclick="location.href='transfers.html'">Internal Transfers</li>
            <li onclick="location.href='adjustments.html'">Inventory Adjustment</li>
            <li onclick="location.href='history.html'">Move History</li>
            <li onclick="location.href='settings.html'">Settings</li>
        </ul>
        <div class="sidebar-footer">
            Logged in as<span class="user-name">Inventory Manager</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </aside>

    <main class="main">
        <header>
            <h1>Delivery Orders</h1>
            <div style="display:flex;gap:10px">
                <button class="btn btn-outline" onclick="printPage()">🖨 Print</button>
                <button class="btn btn-danger" onclick="openModal('createDeliveryModal')">+ Create Shipment</button>
            </div>
        </header>

        <div class="filter-bar">
            <select id="statusFilter" onchange="loadDeliveries()">
                <option value="">All Statuses</option>
                <option value="draft">Draft</option>
                <option value="ready">Ready</option>
                <option value="done">Done</option>
                <option value="shipped">Shipped</option>
            </select>
        </div>

        <div class="data-section">
            <table>
                <thead>
                    <tr>
                        <th>ORDER #</th>
                        <th>CUSTOMER</th>
                        <th>STATUS</th>
                        <th>DATE</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="deliveryTable"></tbody>
            </table>
        </div>
    </main>

    <div class="modal-overlay" id="createDeliveryModal">
        <div class="modal">
            <h2>New Delivery Order</h2>
            <div class="form-group"><label>Customer</label><input type="text" id="dCustomer"
                    placeholder="Customer name"></div>
            <h3 style="margin:1rem 0 0.5rem;font-size:0.9rem">Items</h3>
            <div id="deliveryItems"></div>
            <button class="btn btn-outline btn-sm" style="margin-bottom:1rem" onclick="addDeliveryItem()">+ Add
                Item</button>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="closeModal('createDeliveryModal')">Cancel</button>
                <button class="btn btn-danger" onclick="createDelivery()">Create Delivery</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let products = [], locations = [];

        async function loadDeliveries() {
            const tbody = document.getElementById('deliveryTable');
            tbody.innerHTML = loadingRow(5);
            try {
                await ensureAuth();
                const status = document.getElementById('statusFilter').value;
                const url = status ? `/operations/deliveries?status=${status}` : '/operations/deliveries';
                const data = await api.get(url);
                const list = data.deliveries || [];
                tbody.innerHTML = list.map(d => `
                    <tr>
                        <td>WH/OUT/${String(d.id).padStart(3, '0')}</td>
                        <td>${d.customer || '—'}</td>
                        <td>${statusBadge(d.status)}</td>
                        <td>${new Date(d.created_at).toLocaleDateString()}</td>
                        <td>
                            ${d.status === 'draft' ? `<button class="btn btn-amber btn-sm" onclick="updateStatus(${d.id},'ready')">→ Ready</button>` : ''}
                            ${d.status === 'ready' ? `<button class="btn btn-success btn-sm" onclick="updateStatus(${d.id},'done')">✓ Ship</button>` : ''}
                        </td>
                    </tr>
                `).join('') || emptyRow(5);
            } catch (err) { tbody.innerHTML = emptyRow(5, 'Error: ' + err.message); }
        }

        async function updateStatus(id, status) {
            try {
                await api.patch(`/operations/deliveries/${id}/status`, { status });
                showToast(`Delivery #${id} → ${status.toUpperCase()}`, 'success');
                loadDeliveries();
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function loadDropdowns() {
            try {
                const p = await api.get('/products'); products = Array.isArray(p) ? p : (p.data || []);
                const l = await api.get('/locations'); locations = Array.isArray(l) ? l : (l.data || []);
            } catch { }
        }

        function addDeliveryItem() {
            const container = document.getElementById('deliveryItems');
            const div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = `
                <div class="form-group"><label>Product</label>
                    <select class="di-product">${products.map(p => `<option value="${p.id}">${p.name} (${p.sku})</option>`).join('')}</select>
                </div>
                <div class="form-group"><label>Location</label>
                    <select class="di-location">${locations.map(l => `<option value="${l.id}">${l.name}</option>`).join('')}</select>
                </div>
                <div class="form-group"><label>Qty</label><input type="number" class="di-qty" min="1" value="1"></div>
                <button class="remove-item" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(div);
        }

        async function createDelivery() {
            try {
                const items = [...document.querySelectorAll('#deliveryItems .item-row')].map(row => ({
                    product_id: row.querySelector('.di-product').value,
                    location_id: row.querySelector('.di-location').value,
                    quantity: row.querySelector('.di-qty').value,
                }));
                if (items.length === 0) return showToast('Add at least one item', 'error');
                await api.post('/operations/deliveries', {
                    customer: document.getElementById('dCustomer').value,
                    items,
                });
                showToast('Delivery created!', 'success');
                closeModal('createDeliveryModal');
                document.getElementById('deliveryItems').innerHTML = '';
                loadDeliveries();
            } catch (err) { showToast(err.message, 'error'); }
        }

        document.addEventListener('DOMContentLoaded', () => { loadDropdowns().then(() => loadDeliveries()); });
    </script>
</body>

</html>
